<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Command Centre - PharmaAssist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#eff4ff",
                        "on-secondary-container": "#007230",
                        "primary": "#00685b",
                        "surface-container": "#e5eeff",
                        "outline-variant": "#bcc9c5",
                        "on-tertiary-container": "#fffbff",
                        "background": "#f8f9ff",
                        "on-secondary-fixed-variant": "#005320",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "inverse-surface": "#213145",
                        "primary-container": "#008373",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#2a1700",
                        "on-primary-fixed": "#00201b",
                        "primary-fixed": "#81f6e0",
                        "on-primary-fixed-variant": "#005046",
                        "on-surface-variant": "#3d4946",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#ffb95f",
                        "secondary-fixed-dim": "#62df7d",
                        "secondary-container": "#7cf994",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary": "#825100",
                        "primary-fixed-dim": "#63dac5",
                        "secondary-fixed": "#7ffc97",
                        "on-background": "#0b1c30",
                        "surface-variant": "#d3e4fe",
                        "on-primary-container": "#f4fffb",
                        "surface-container-high": "#dce9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "tertiary-fixed": "#ffddb8",
                        "surface-dim": "#cbdbf5",
                        "surface-container-highest": "#d3e4fe",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "outline": "#6d7a76",
                        "surface-tint": "#006b5d",
                        "tertiary-container": "#a36700",
                        "on-primary": "#ffffff",
                        "surface": "#f8f9ff",
                        "secondary": "#006e2d",
                        "on-secondary-fixed": "#002109",
                        "surface-bright": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "inverse-primary": "#63dac5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "lg": "24px",
                        "xl": "32px",
                        "base": "4px",
                        "sm": "12px",
                        "safe-bottom": "80px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"],
                        "label-hinglish": ["Inter"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "display-currency": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-hinglish": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["22px", { "lineHeight": "30px", "fontWeight": "700" }],
                        "display-currency": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            80%, 100% { transform: scale(2.5); opacity: 0; }
        }
        
        .mic-bounce {
            animation: mic-bounce 2s ease-in-out infinite;
        }
        @keyframes mic-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Custom Dark Teal Gradient */
        .bg-voice-gradient {
            background: linear-gradient(180deg, #0E9F8C 0%, #075E54 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-voice-gradient text-on-primary h-screen w-full flex flex-col font-body-md overflow-hidden antialiased">
<!-- Top Action Bar (Close) -->
<div class="w-full flex justify-end p-md">
<button aria-label="Close Voice Assistant" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors backdrop-blur-sm">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-md pb-[120px] relative w-full max-w-2xl mx-auto">
<!-- Live Transcript -->
<div class="mb-xl text-center w-full px-4" id="transcript-container">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-display-currency md:text-display-currency text-white opacity-90 transition-all duration-300">
                "Aaj ka collection kitna hai?"
            </h1>
</div>
<!-- Result Card (Hidden by default, shown for answer state) -->
<div class="bg-surface text-on-surface rounded-xl p-lg w-full max-w-sm mx-auto shadow-lg mb-xl transform transition-all duration-500 scale-100 opacity-100" id="result-card">
<div class="flex items-center justify-between mb-sm">
<span class="font-label-hinglish text-label-hinglish text-outline">Today's Collection</span>
<button class="text-primary hover:bg-surface-container-low p-2 rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
</div>
<div class="font-display-currency text-display-currency text-primary">
                ₹18,240
            </div>
</div>
<!-- Suggestion Chips Container -->
<div class="w-full mt-auto mb-xl opacity-80" id="suggestions-container">
<p class="font-label-hinglish text-label-hinglish text-white/80 mb-sm text-center">Aap ye bol sakte ho:</p>
<div class="flex flex-wrap justify-center gap-sm">
<button class="px-4 py-2 rounded-full border border-white/30 bg-white/10 backdrop-blur-sm hover:bg-white/20 transition-colors font-body-md text-white text-sm">
                    "Aaj ka collection?"
                </button>
<button class="px-4 py-2 rounded-full border border-white/30 bg-white/10 backdrop-blur-sm hover:bg-white/20 transition-colors font-body-md text-white text-sm">
                    "Cipla ka payment kitna baaki?"
                </button>
<button class="px-4 py-2 rounded-full border border-white/30 bg-white/10 backdrop-blur-sm hover:bg-white/20 transition-colors font-body-md text-white text-sm">
                    "Dolo ka stock?"
                </button>
<button class="px-4 py-2 rounded-full border border-white/30 bg-white/10 backdrop-blur-sm hover:bg-white/20 transition-colors font-body-md text-white text-sm">
                    "Naya bill banao"
                </button>
</div>
</div>
</div>
<!-- Bottom Anchored Voice/Keyboard Controls -->
<div class="absolute bottom-0 left-0 w-full pb-safe-bottom flex flex-col items-center justify-end z-50">
<!-- Animated Mic Button -->
<div class="relative flex justify-center items-center mb-lg">
<!-- Pulsing background rings -->
<div class="absolute inset-0 rounded-full bg-secondary-container/40 pulse-ring"></div>
<div class="absolute inset-0 rounded-full bg-secondary-container/20 pulse-ring" style="animation-delay: 0.5s;"></div>
<button aria-label="Stop Listening" class="relative w-24 h-24 rounded-full bg-primary-container text-on-primary-container shadow-[0_8px_32px_rgba(0,131,115,0.4)] flex items-center justify-center z-10 mic-bounce active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Keyboard Fallback -->
<button class="font-label-hinglish text-label-hinglish text-white/70 hover:text-white pb-lg flex items-center gap-2 transition-colors">
<span class="material-symbols-outlined text-sm">keyboard</span>
            Type karo
        </button>
</div>
<script>
        // Simple script to toggle states for demonstration if needed, 
        // but primarily the visual state is established above.
        document.addEventListener('DOMContentLoaded', () => {
            // State management logic would go here
        });
    </script>
</body></html>
