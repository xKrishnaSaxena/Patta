</ul>
</nav>
</aside>
<!-- Top App Bar -->
<header class="md:hidden flex justify-between items-center px-md py-sm w-full bg-surface border-b border-outline-variant sticky top-0 z-30">
<div class="flex items-center">
<button aria-label="Go Back" class="material-symbols-outlined text-primary mr-sm">arrow_back</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Nayi Dawai</h1>
</div>
<button class="font-label-hinglish text-label-hinglish text-primary">Save</button>
</header>
<!-- Desktop Header -->
<header class="hidden md:flex justify-between items-center px-md py-sm w-full bg-surface border-b border-outline-variant sticky top-0 z-30">
<div class="flex items-center">
<button aria-label="Go Back" class="material-symbols-outlined text-primary mr-sm">arrow_back</button>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary">Nayi Dawai</h1>
</div>
</header>
<main class="p-md space-y-md max-w-4xl mx-auto">
<!-- Voice Banner -->
<button class="w-full bg-primary-container/20 text-on-primary-container border border-primary-container rounded-xl p-sm flex items-center justify-center gap-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-label-hinglish text-label-hinglish">Bolke bhar do</span>
</button>
<!-- Identity Group -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm">
<h2 class="font-headline-md text-headline-md text-on-background mb-sm">Identity</h2>
<div class="space-y-sm">
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-base">Name</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg py-sm pl-sm pr-12 font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:outline-none" placeholder="Search or type medicine name" type="text"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 material-symbols-outlined text-primary">mic</button>
</div>
</div>
<div class="grid grid-cols-2 gap-sm">
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-base">Salt</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:outline-none" placeholder="e.g. Paracetamol" type="text"/>
</div>
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-base">Company</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:outline-none" placeholder="e.g. Cipla" type="text"/>
</div>
</div>
</div>
</section>
<!-- Pack Group -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm">
<h2 class="font-headline-md text-headline-md text-on-background mb-sm">Pack Details</h2>
<div class="space-y-md">
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-xs">Type</label>
<div class="flex flex-wrap gap-xs">
<button class="px-md py-xs rounded-full border border-outline-variant font-label-hinglish text-label-hinglish text-on-surface-variant hover:bg-surface-container active:scale-95 transition-all">Strip</button>
<button class="px-md py-xs rounded-full border border-primary bg-primary-container/10 font-label-hinglish text-label-hinglish text-primary active:scale-95 transition-all">Bottle</button>
<button class="px-md py-xs rounded-full border border-outline-variant font-label-hinglish text-label-hinglish text-on-surface-variant hover:bg-surface-container active:scale-95 transition-all">Box</button>
<button class="px-md py-xs rounded-full border border-outline-variant font-label-hinglish text-label-hinglish text-on-surface-variant hover:bg-surface-container active:scale-95 transition-all">Tube</button>
</div>
</div>
<div class="flex items-center justify-between">
<label class="font-label-hinglish text-label-hinglish text-on-surface-variant">Units per pack</label>
<div class="flex items-center bg-surface border border-outline-variant rounded-lg">
<button class="p-xs material-symbols-outlined text-primary hover:bg-surface-container rounded-l-lg transition-colors">remove</button>
<input class="w-16 text-center border-none p-0 font-body-md text-body-md bg-transparent focus:ring-0" type="number" value="1"/>
<button class="p-xs material-symbols-outlined text-primary hover:bg-surface-container rounded-r-lg transition-colors">add</button>
</div>
</div>
<div class="flex items-center justify-between">
<label class="font-label-hinglish text-label-hinglish text-on-surface-variant">Allow Loose Sale?</label>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-high rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>

<div class="space-y-sm">
<div class="grid grid-cols-2 gap-sm">
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-base">MRP (₹)</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:outline-none" placeholder="0.00" type="number"/>
</div>
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-base">Rate (₹)</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:outline-none" placeholder="0.00" type="number"/>
</div>
</div>
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-xs">GST %</label>
<div class="flex flex-wrap gap-xs">
<button class="px-md py-xs rounded-full border border-outline-variant font-label-hinglish text-label-hinglish text-on-surface-variant hover:bg-surface-container active:scale-95 transition-all">0</button>
<button class="px-md py-xs rounded-full border border-outline-variant font-label-hinglish text-label-hinglish text-on-surface-variant hover:bg-surface-container active:scale-95 transition-all">5</button>
<button class="px-md py-xs rounded-full border border-primary bg-primary-container/10 font-label-hinglish text-label-hinglish text-primary active:scale-95 transition-all">12</button>
<button class="px-md py-xs rounded-full border border-outline-variant font-label-hinglish text-label-hinglish text-on-surface-variant hover:bg-surface-container active:scale-95 transition-all">18</button>
</div>
</div>
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-base">HSN Code</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:outline-none" placeholder="e.g. 3004" type="text"/>
</div>
</div>
</section>
<!-- Shelf Group -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm">

<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-base">Rack Location</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:outline-none" placeholder="e.g. A3" type="text"/>
</div>
<div>
<label class="block font-label-hinglish text-label-hinglish text-on-surface-variant mb-base">Reorder Level</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:outline-none" placeholder="e.g. 10" type="number"/>
</div>
</div>
</section>

<label class="flex items-center gap-sm p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container transition-colors">
<input class="w-5 h-5 text-primary rounded border-outline-variant focus:ring-primary" type="checkbox"/>
<span class="font-label-hinglish text-label-hinglish text-on-background">Schedule H1 Drug</span>
</label>
<label class="flex items-center gap-sm p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container transition-colors">
<input class="w-5 h-5 text-primary rounded border-outline-variant focus:ring-primary" type="checkbox"/>
<span class="font-label-hinglish text-label-hinglish text-on-background">Fridge Item (2-8°C)</span>
</label>
</div>

<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-hinglish text-label-hinglish">Billing</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-colors scale-98 active:scale-95 rounded-xl" href="#">
<span class="material-symbols-outlined">inventory_2</span>
<span class="font-label-hinglish text-label-hinglish">Stock</span>

<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-colors scale-98 active:scale-95 rounded-xl" href="#">

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">more_horiz</span>
